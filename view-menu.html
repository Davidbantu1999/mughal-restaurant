<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Our Menu | Mughal Indian Restaurant Helsinki</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root{
      --purple:#4c00b0;--purple-dark:#36007d;--purple-deep:#25005a;--purple-mid:#6a1ec8;
      --purple-light:#f0e8ff;--gold:#f5c842;--gold-dark:#c9a227;--white:#ffffff;
      --cream:#f9f5ff;--text:#2a2a2a;--text-light:#666;--border:#e2d5f5;
      --shadow:rgba(76,0,176,0.18);--r:18px;--t:all 0.38s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{font-family:'Poppins',sans-serif;color:var(--text);background:linear-gradient(135deg,var(--purple-deep),var(--purple),var(--purple-mid));min-height:100vh;overflow-x:hidden;padding-top:80px}
    @media(max-width:768px){body{padding-top:60px}}
    a{text-decoration:none;color:inherit}
    ul{list-style:none}
    img{display:block;width:100%;object-fit:cover}
    .container{max-width:1200px;margin:0 auto;padding:0 28px}

    /* Navbar */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 28px;background:rgba(37,0,90,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;transition:var(--t)}
    .nav-logo img{height:50px;width:auto}
    .nav-links{display:flex;gap:24px;align-items:center}
    .nav-link{color:var(--white);font-weight:500;font-size:0.95rem;transition:var(--t)}
    .nav-link:hover{color:var(--gold)}
    .nav-btn{padding:10px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border-radius:50px;font-weight:600;font-size:0.9rem;transition:var(--t)}
    .nav-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,66,0.4)}

    /* Hero */
    .hero{text-align:center;padding:60px 20px 40px;background:linear-gradient(180deg,rgba(37,0,90,0.5),transparent)}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4rem);color:var(--white);margin-bottom:16px;line-height:1.1}
    .hero p{color:rgba(255,255,255,0.8);font-size:1.1rem;max-width:600px;margin:0 auto}
    .hero-subtitle{color:var(--gold);font-weight:600;letter-spacing:3px;text-transform:uppercase;font-size:0.85rem;margin-bottom:12px}

    /* Category Tabs */
    .category-tabs{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:20px 0;margin-bottom:40px}
    .cat-tab{padding:10px 28px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:50px;color:var(--white);font-weight:600;font-size:0.9rem;cursor:pointer;transition:var(--t);white-space:nowrap}
    .cat-tab:hover,.cat-tab.active{background:var(--gold);color:var(--purple-deep);border-color:var(--gold);transform:scale(1.05)}

    /* Menu Grid */
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:30px;padding-bottom:80px}
    .menu-item{background:rgba(255,255,255,0.08);border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);transition:var(--t)}
    .menu-item:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(0,0,0,0.3);border-color:rgba(245,200,66,0.3)}
    .item-image{height:220px;position:relative;overflow:hidden}
    .item-image img{height:100%;transition:transform 0.5s ease}
    .menu-item:hover .item-image img{transform:scale(1.08)}
    .item-badge{position:absolute;top:12px;left:12px;padding:6px 14px;border-radius:20px;font-size:0.75rem;font-weight:700;text-transform:uppercase}
    .badge-popular{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
    .badge-new{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep)}
    .spice-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:600;backdrop-filter:blur(6px)}
    .item-content{padding:24px}
    .item-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
    .item-name{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--white);font-weight:600;line-height:1.3;flex:1}
    .item-price{color:var(--gold);font-size:1.4rem;font-weight:700}
    .item-desc{color:rgba(255,255,255,0.7);font-size:0.95rem;line-height:1.6;margin-bottom:16px}
    .item-meta{display:flex;gap:12px;margin-bottom:16px}
    .meta-tag{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600}
    .meta-veg{background:rgba(74,222,128,0.15);color:#4ade80}
    .meta-nonveg{background:rgba(248,113,113,0.15);color:#f87171}
    .order-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border:none;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center;gap:8px}
    .order-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(245,200,66,0.4)}

    /* Footer */
    .footer{text-align:center;padding:40px 20px;background:rgba(37,0,90,0.5);border-top:1px solid rgba(255,255,255,0.1)}
    .footer-logo img{height:60px;width:auto;margin:0 auto 16px}
    .footer p{color:rgba(255,255,255,0.7);font-size:0.9rem;margin-bottom:8px}
    .footer a{color:var(--gold);font-weight:600}

    /* Responsive */
    @media(max-width:768px){
      .navbar{padding:12px 20px}
      .nav-links{display:none}
      .menu-grid{grid-template-columns:1fr;gap:20px}
      .hero h1{font-size:2rem}
      .category-tabs{overflow-x:auto;justify-content:flex-start;padding:20px 20px}
      .cat-tab{flex-shrink:0}
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">
      <img src="https://davidbantu1999.github.io/mughal-restaurant/logo.png" alt="Mughal"/>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="view-menu.html" class="nav-link" style="color:var(--gold)">Menu</a>
      <a href="your-orders.html" class="nav-link">Orders</a>
      <a href="food-ordering.html" class="nav-btn">Order Now</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <p class="hero-subtitle">Taste of India</p>
    <h1>Our Menu</h1>
    <p>Authentic Indian cuisine crafted with love and tradition</p>
  </section>

  <!-- Category Tabs -->
  <div class="category-tabs">
    <button class="cat-tab active" onclick="filterCategory('all')">All</button>
    <button class="cat-tab" onclick="filterCategory('starters')">Starters</button>
    <button class="cat-tab" onclick="filterCategory('mains')">Mains</button>
    <button class="cat-tab" onclick="filterCategory('biryani')">Biryani</button>
    <button class="cat-tab" onclick="filterCategory('breads')">Breads</button>
    <button class="cat-tab" onclick="filterCategory('drinks')">Drinks</button>
    <button class="cat-tab" onclick="filterCategory('desserts')">Desserts</button>
  </div>

  <!-- Menu Grid -->
  <div class="container">
    <div class="menu-grid" id="menuGrid">
      <!-- Menu items will be loaded here -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-logo">
      <img src="https://davidbantu1999.github.io/mughal-restaurant/logo.png" alt="Mughal"/>
    </div>
    <p>Aallonhalkoja 3, 00540 Helsinki, Finland</p>
    <p>+358 40 123 4567</p>
    <a href="food-ordering.html">Start Your Order →</a>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig={
      apiKey:"AIzaSyAmimDsjW_pF2NGw-w-40QzTsgmf1tdqyI",
      authDomain:"bdmsalonappointment.firebaseapp.com",
      databaseURL:"https://bdmsalonappointment-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"bdmsalonappointment",
      storageBucket:"bdmsalonappointment.appspot.com",
      messagingSenderId:"123456789012",
      appId:"1:123456789012:web:abcdef123456"
    };
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();

    let menuItems=[];
    let currentCategory='all';

    function loadMenuFromFirebase(){
      db.ref('menu').once('value').then(snapshot=>{
        const data=snapshot.val();
        if(data){
          menuItems=Object.values(data);
          renderMenu();
        }else{
          loadDefaultMenu();
        }
      }).catch(()=>loadDefaultMenu());
    }

    function loadDefaultMenu(){
      menuItems=[
        {id:1,name:'Samosa',description:'Crispy pastry filled with spiced potatoes and peas',price:4.50,category:'starters',image:'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&q=80',rating:4.8,popular:true,spice:'Mild',type:'veg'},
        {id:2,name:'Chicken Tikka',description:'Tender chicken marinated in yogurt and spices',price:8.50,category:'starters',image:'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=500&q=80',rating:4.7,popular:true,spice:'Medium',type:'nonveg'},
        {id:3,name:'Butter Chicken',description:'Creamy tomato-based curry with tender chicken',price:14.50,category:'mains',image:'https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?w=500&q=80',rating:4.9,popular:true,spice:'Mild',type:'nonveg'},
        {id:4,name:'Lamb Rogan Josh',description:'Aromatic lamb curry with Kashmiri spices',price:16.00,category:'mains',image:'https://images.unsplash.com/photo-1545247181-516773cae754?w=500&q=80',rating:4.6,popular:false,spice:'Hot',type:'nonveg'},
        {id:5,name:'Palak Paneer',description:'Cottage cheese in creamy spinach gravy',price:12.00,category:'mains',image:'https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=500&q=80',rating:4.5,popular:false,spice:'Mild',type:'veg'},
        {id:6,name:'Chicken Biryani',description:'Fragrant basmati rice with spiced chicken',price:13.50,category:'biryani',image:'https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&q=80',rating:4.8,popular:true,spice:'Medium',type:'nonveg'},
        {id:7,name:'Mutton Biryani',description:'Aromatic rice with tender mutton pieces',price:15.00,category:'biryani',image:'https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=500&q=80',rating:4.7,popular:true,spice:'Hot',type:'nonveg'},
        {id:8,name:'Vegetable Biryani',description:'Mixed vegetables in fragrant spiced rice',price:11.00,category:'biryani',image:'https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=500&q=80',rating:4.4,popular:false,spice:'Mild',type:'veg'},
        {id:9,name:'Garlic Naan',description:'Fresh baked bread with garlic butter',price:3.00,category:'breads',image:'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&q=80',rating:4.6,popular:false,spice:'Mild',type:'veg'},
        {id:10,name:'Butter Naan',description:'Soft bread brushed with butter',price:2.50,category:'breads',image:'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&q=80',rating:4.5,popular:false,spice:'Mild',type:'veg'},
        {id:11,name:'Mango Lassi',description:'Refreshing yogurt drink with mango',price:4.50,category:'drinks',image:'https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=500&q=80',rating:4.8,popular:true,spice:'None',type:'veg'},
        {id:12,name:'Gulab Jamun',description:'Sweet milk dumplings in syrup',price:5.00,category:'desserts',image:'https://images.unsplash.com/photo-1666190098808-9b0269b8d0a9?w=500&q=80',rating:4.7,popular:true,spice:'None',type:'veg'}
      ];
      renderMenu();
    }

    function filterCategory(category){
      currentCategory=category;
      document.querySelectorAll('.cat-tab').forEach(tab=>tab.classList.remove('active'));
      event.target.classList.add('active');
      renderMenu();
    }

    function renderMenu(){
      const grid=document.getElementById('menuGrid');
      const filtered=currentCategory==='all'?menuItems:menuItems.filter(item=>item.category===currentCategory);
      
      grid.innerHTML=filtered.map(item=>`
        <div class="menu-item">
          <div class="item-image">
            <img src="${item.image}" alt="${item.name}" loading="lazy"/>
            ${item.popular?'<span class="item-badge badge-popular">⭐ Popular</span>':''}
            <span class="spice-badge">${item.spice}</span>
          </div>
          <div class="item-content">
            <div class="item-header">
              <h3 class="item-name">${item.name}</h3>
              <span class="item-price">€${item.price.toFixed(2)}</span>
            </div>
            <p class="item-desc">${item.description}</p>
            <div class="item-meta">
              <span class="meta-tag ${item.type==='veg'?'meta-veg':'meta-nonveg'}">${item.type==='veg'?'🌿 Veg':'🍗 Non-Veg'}</span>
              <span class="meta-tag" style="background:rgba(245,200,66,0.15);color:var(--gold)">⭐ ${item.rating}</span>
            </div>
            <button class="order-btn" onclick="window.location.href='food-ordering.html'">
              <i class="fas fa-shopping-cart"></i> Order Now
            </button>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded',()=>{
      loadDefaultMenu();
      loadMenuFromFirebase();
    });
  </script>
</body>
</html>
