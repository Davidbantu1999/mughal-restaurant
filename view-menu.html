<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Our Menu | Mughal Indian Restaurant Helsinki</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root{
      --purple:#4c00b0;--purple-dark:#36007d;--purple-deep:#25005a;--purple-mid:#6a1ec8;
      --purple-light:#f0e8ff;--gold:#f5c842;--gold-dark:#c9a227;--white:#ffffff;
      --cream:#f9f5ff;--text:#2a2a2a;--text-light:#666;--border:#e2d5f5;
      --shadow:rgba(76,0,176,0.18);--r:18px;--t:all 0.38s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{font-family:'Poppins',sans-serif;color:var(--text);background:linear-gradient(135deg,var(--purple-deep),var(--purple),var(--purple-mid));min-height:100vh;overflow-x:hidden;padding-top:80px}
    @media(max-width:768px){body{padding-top:60px}}
    a{text-decoration:none;color:inherit}
    ul{list-style:none}
    img{display:block;width:100%;object-fit:cover}
    .container{max-width:1200px;margin:0 auto;padding:0 28px}

    /* Navbar */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:14px 28px;background:rgba(37,0,90,0.97);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;transition:var(--t);border-bottom:1px solid rgba(255,255,255,0.06)}
    .nav-logo img{height:46px;width:auto}
    .nav-links{display:flex;gap:20px;align-items:center}
    .nav-link{color:rgba(255,255,255,0.85);font-weight:500;font-size:0.9rem;transition:var(--t)}
    .nav-link:hover{color:var(--gold)}
    .nav-btn{padding:9px 22px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border-radius:50px;font-weight:700;font-size:0.85rem;transition:var(--t)}
    .nav-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,66,0.4)}
    .nav-hamburger{display:none;width:40px;height:40px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1.1rem;transition:var(--t)}
    .nav-hamburger:hover{background:var(--gold);color:var(--purple-deep)}
    /* Mobile drawer */
    .mob-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1100;backdrop-filter:blur(4px)}
    .mob-drawer-overlay.open{display:block}
    .mob-drawer{position:fixed;top:0;right:-100%;width:75vw;max-width:280px;height:100%;background:linear-gradient(160deg,var(--purple-deep),var(--purple));z-index:1101;transition:right 0.35s ease;padding:20px;display:flex;flex-direction:column;gap:0}
    .mob-drawer.open{right:0}
    .mob-drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
    .mob-drawer-header img{height:40px;width:auto}
    .mob-drawer-close{width:34px;height:34px;background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
    .mob-drawer a{display:flex;align-items:center;gap:12px;padding:14px 16px;color:rgba(255,255,255,0.85);font-size:0.9rem;font-weight:500;border-radius:10px;text-decoration:none;transition:var(--t);margin-bottom:4px}
    .mob-drawer a:hover,.mob-drawer a.active{background:rgba(255,255,255,0.08);color:var(--gold)}
    .mob-drawer a i{width:18px;color:var(--gold);font-size:0.9rem}
    .mob-drawer-cta{margin-top:auto;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1)}
    .mob-drawer-cta a{display:block;text-align:center;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border-radius:12px;font-weight:700;font-size:0.9rem;text-decoration:none}

    /* Hero */
    .hero{text-align:center;padding:50px 20px 36px;background:linear-gradient(180deg,rgba(37,0,90,0.4),transparent)}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);color:var(--white);margin-bottom:12px;line-height:1.1}
    .hero p{color:rgba(255,255,255,0.75);font-size:1rem;max-width:550px;margin:0 auto}
    .hero-subtitle{color:var(--gold);font-weight:600;letter-spacing:3px;text-transform:uppercase;font-size:0.8rem;margin-bottom:10px}

    /* Category Tabs */
    .category-tabs-wrap{position:sticky;top:60px;z-index:99;background:rgba(37,0,90,0.9);backdrop-filter:blur(10px);padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .category-tabs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;max-width:900px;margin:0 auto}
    .cat-tab{padding:8px 22px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:50px;color:rgba(255,255,255,0.85);font-weight:600;font-size:0.85rem;cursor:pointer;transition:var(--t);white-space:nowrap}
    .cat-tab:hover,.cat-tab.active{background:var(--gold);color:var(--purple-deep);border-color:var(--gold);transform:scale(1.03)}

    /* Menu Grid */
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding-bottom:60px}
    .menu-item{background:rgba(255,255,255,0.07);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);transition:var(--t)}
    .menu-item:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,0.3);border-color:rgba(245,200,66,0.25)}
    .item-image{height:190px;position:relative;overflow:hidden}
    .item-image img{height:100%;transition:transform 0.5s ease}
    .menu-item:hover .item-image img{transform:scale(1.07)}
    .item-badge{position:absolute;top:10px;left:10px;padding:4px 12px;border-radius:20px;font-size:0.7rem;font-weight:700;text-transform:uppercase}
    .badge-popular{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
    .badge-new{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep)}
    .spice-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.65);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:0.68rem;font-weight:600;backdrop-filter:blur(6px)}
    .item-content{padding:18px 20px 20px}
    .item-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;gap:8px}
    .item-name{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--white);font-weight:600;line-height:1.3;flex:1}
    .item-price{color:var(--gold);font-size:1.2rem;font-weight:700;white-space:nowrap}
    .item-desc{color:rgba(255,255,255,0.65);font-size:0.88rem;line-height:1.55;margin-bottom:14px}
    .item-meta{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .meta-tag{padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:600}
    .meta-veg{background:rgba(74,222,128,0.15);color:#4ade80}
    .meta-nonveg{background:rgba(248,113,113,0.15);color:#f87171}
    .order-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border:none;border-radius:12px;font-weight:700;font-size:0.9rem;cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center;gap:8px}
    .order-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,66,0.4)}

    /* Footer */
    .footer{text-align:center;padding:40px 24px;background:rgba(37,0,90,0.5);border-top:1px solid rgba(255,255,255,0.1);margin-top:20px}
    .footer-logo img{height:52px;width:auto;margin:0 auto 14px}
    .footer p{color:rgba(255,255,255,0.7);font-size:0.88rem;margin-bottom:6px}
    .footer a{color:var(--gold);font-weight:600;display:inline-block;margin-top:12px;padding:10px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border-radius:50px;font-size:0.88rem}

    /* Responsive */
    @media(max-width:1024px){
      .menu-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
    }
    @media(max-width:768px){
      .navbar{padding:11px 18px}
      .nav-links{display:none}
      .nav-hamburger{display:flex}
      .menu-grid{grid-template-columns:repeat(2,1fr);gap:14px}
      .item-image{height:150px}
      .item-content{padding:14px 16px 16px}
      .item-name{font-size:1rem}
      .item-price{font-size:1rem}
      .item-desc{font-size:0.82rem;margin-bottom:10px}
      .hero{padding:36px 16px 28px}
      .hero h1{font-size:1.8rem}
      .hero p{font-size:0.9rem}
      .category-tabs-wrap{top:56px}
      .category-tabs{overflow-x:auto;justify-content:flex-start;flex-wrap:nowrap;scrollbar-width:none}
      .category-tabs::-webkit-scrollbar{display:none}
      .cat-tab{flex-shrink:0;padding:7px 16px;font-size:0.8rem}
      .container{padding:0 14px}
    }
    @media(max-width:480px){
      .menu-grid{grid-template-columns:repeat(2,1fr);gap:10px}
      .item-image{height:130px}
      .item-badge{font-size:0.62rem;padding:3px 8px}
      .item-name{font-size:0.9rem}
      .item-price{font-size:0.9rem}
      .order-btn{padding:10px;font-size:0.82rem}
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">
      <img src="https://davidbantu1999.github.io/mughal-restaurant/logo.png" alt="Mughal"/>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="view-menu.html" class="nav-link" style="color:var(--gold)">Menu</a>
      <a href="your-orders.html" class="nav-link">Orders</a>
      <a href="food-ordering.html" class="nav-btn">Order Now</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" onclick="openDrawer()"><i class="fas fa-bars"></i></button>
  </nav>

  <!-- Mobile Drawer -->
  <div class="mob-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="mob-drawer" id="mobDrawer">
    <div class="mob-drawer-header">
      <img src="https://davidbantu1999.github.io/mughal-restaurant/logo.png" alt="Mughal"/>
      <button class="mob-drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
    </div>
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="view-menu.html" class="active"><i class="fas fa-book-open"></i> View Menu</a>
    <a href="your-orders.html"><i class="fas fa-receipt"></i> My Orders</a>
    <div class="mob-drawer-cta">
      <a href="food-ordering.html"><i class="fas fa-shopping-cart"></i> Order Now</a>
    </div>
  </div>

  <!-- Hero -->
  <section class="hero">
    <p class="hero-subtitle">Taste of India</p>
    <h1>Our Menu</h1>
    <p>Authentic Indian cuisine crafted with love and tradition</p>
  </section>

  <!-- Category Tabs -->
  <div class="category-tabs-wrap">
    <div class="category-tabs">
      <button class="cat-tab active" onclick="filterCategory('all',event)">All</button>
      <button class="cat-tab" onclick="filterCategory('starters',event)">Starters</button>
      <button class="cat-tab" onclick="filterCategory('mains',event)">Mains</button>
      <button class="cat-tab" onclick="filterCategory('biryani',event)">Biryani</button>
      <button class="cat-tab" onclick="filterCategory('breads',event)">Breads</button>
      <button class="cat-tab" onclick="filterCategory('drinks',event)">Drinks</button>
      <button class="cat-tab" onclick="filterCategory('desserts',event)">Desserts</button>
    </div>
  </div>

  <!-- Menu Grid -->
  <div class="container">
    <div class="menu-grid" id="menuGrid">
      <!-- Menu items will be loaded here -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-logo">
      <img src="https://davidbantu1999.github.io/mughal-restaurant/logo.png" alt="Mughal"/>
    </div>
    <p>Aallonhalkoja 3, 00540 Helsinki, Finland</p>
    <p>+358 40 123 4567</p>
    <a href="food-ordering.html">Start Your Order →</a>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig={
      apiKey:"AIzaSyAmimDsjW_pF2NGw-w-40QzTsgmf1tdqyI",
      authDomain:"bdmsalonappointment.firebaseapp.com",
      databaseURL:"https://bdmsalonappointment-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"bdmsalonappointment",
      storageBucket:"bdmsalonappointment.appspot.com",
      messagingSenderId:"123456789012",
      appId:"1:123456789012:web:abcdef123456"
    };
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();

    let menuItems=[];
    let currentCategory='all';

    function loadMenuFromFirebase(){
      db.ref('menu').once('value').then(snapshot=>{
        const data=snapshot.val();
        if(data){
          menuItems=Object.values(data);
          renderMenu();
        }else{
          loadDefaultMenu();
        }
      }).catch(()=>loadDefaultMenu());
    }

    function loadDefaultMenu(){
      menuItems=[
        {id:1,name:'Samosa',description:'Crispy pastry filled with spiced potatoes and peas',price:4.50,category:'starters',image:'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&q=80',rating:4.8,popular:true,spice:'Mild',type:'veg'},
        {id:2,name:'Chicken Tikka',description:'Tender chicken marinated in yogurt and spices',price:8.50,category:'starters',image:'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=500&q=80',rating:4.7,popular:true,spice:'Medium',type:'nonveg'},
        {id:3,name:'Butter Chicken',description:'Creamy tomato-based curry with tender chicken',price:14.50,category:'mains',image:'https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?w=500&q=80',rating:4.9,popular:true,spice:'Mild',type:'nonveg'},
        {id:4,name:'Lamb Rogan Josh',description:'Aromatic lamb curry with Kashmiri spices',price:16.00,category:'mains',image:'https://images.unsplash.com/photo-1545247181-516773cae754?w=500&q=80',rating:4.6,popular:false,spice:'Hot',type:'nonveg'},
        {id:5,name:'Palak Paneer',description:'Cottage cheese in creamy spinach gravy',price:12.00,category:'mains',image:'https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=500&q=80',rating:4.5,popular:false,spice:'Mild',type:'veg'},
        {id:6,name:'Chicken Biryani',description:'Fragrant basmati rice with spiced chicken',price:13.50,category:'biryani',image:'https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&q=80',rating:4.8,popular:true,spice:'Medium',type:'nonveg'},
        {id:7,name:'Mutton Biryani',description:'Aromatic rice with tender mutton pieces',price:15.00,category:'biryani',image:'https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=500&q=80',rating:4.7,popular:true,spice:'Hot',type:'nonveg'},
        {id:8,name:'Vegetable Biryani',description:'Mixed vegetables in fragrant spiced rice',price:11.00,category:'biryani',image:'https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=500&q=80',rating:4.4,popular:false,spice:'Mild',type:'veg'},
        {id:9,name:'Garlic Naan',description:'Fresh baked bread with garlic butter',price:3.00,category:'breads',image:'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&q=80',rating:4.6,popular:false,spice:'Mild',type:'veg'},
        {id:10,name:'Butter Naan',description:'Soft bread brushed with butter',price:2.50,category:'breads',image:'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&q=80',rating:4.5,popular:false,spice:'Mild',type:'veg'},
        {id:11,name:'Mango Lassi',description:'Refreshing yogurt drink with mango',price:4.50,category:'drinks',image:'https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=500&q=80',rating:4.8,popular:true,spice:'None',type:'veg'},
        {id:12,name:'Gulab Jamun',description:'Sweet milk dumplings in syrup',price:5.00,category:'desserts',image:'https://images.unsplash.com/photo-1666190098808-9b0269b8d0a9?w=500&q=80',rating:4.7,popular:true,spice:'None',type:'veg'}
      ];
      renderMenu();
    }

    function filterCategory(category,e){
      currentCategory=category;
      document.querySelectorAll('.cat-tab').forEach(tab=>tab.classList.remove('active'));
      if(e&&e.target) e.target.classList.add('active');
      renderMenu();
    }
    function openDrawer(){document.getElementById('mobDrawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');document.body.style.overflow='hidden'}
    function closeDrawer(){document.getElementById('mobDrawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');document.body.style.overflow=''}

    function orderItem(id,name,price,category,image){
      const item={id,name,price,category,image:image+'?w=500&q=80',quantity:1,spice:'Medium',type:'nonveg'};
      let pending=JSON.parse(localStorage.getItem('mughalPendingCart')||'[]');
      const idx=pending.findIndex(i=>i.id===id);
      if(idx>=0) pending[idx].quantity++;
      else pending.push(item);
      localStorage.setItem('mughalPendingCart',JSON.stringify(pending));
      window.location.href='food-ordering.html';
    }

    function renderMenu(){
      const grid=document.getElementById('menuGrid');
      const filtered=currentCategory==='all'?menuItems:menuItems.filter(item=>item.category===currentCategory);
      
      grid.innerHTML=filtered.map(item=>`
        <div class="menu-item">
          <div class="item-image">
            <img src="${item.image}" alt="${item.name}" loading="lazy"/>
            ${item.popular?'<span class="item-badge badge-popular">⭐ Popular</span>':''}
            <span class="spice-badge">${item.spice}</span>
          </div>
          <div class="item-content">
            <div class="item-header">
              <h3 class="item-name">${item.name}</h3>
              <span class="item-price">€${item.price.toFixed(2)}</span>
            </div>
            <p class="item-desc">${item.description}</p>
            <div class="item-meta">
              <span class="meta-tag ${item.type==='veg'?'meta-veg':'meta-nonveg'}">${item.type==='veg'?'🌿 Veg':'🍗 Non-Veg'}</span>
              <span class="meta-tag" style="background:rgba(245,200,66,0.15);color:var(--gold)">⭐ ${item.rating}</span>
            </div>
            <button class="order-btn" onclick="orderItem(${item.id},'${item.name.replace(/'/g,"&apos;")}',${item.price},'${item.category}','${item.image.split('?')[0]}')">
              <i class="fas fa-shopping-cart"></i> Order Now
            </button>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded',()=>{
      loadDefaultMenu();
      loadMenuFromFirebase();
    });
  </script>
</body>
</html>
