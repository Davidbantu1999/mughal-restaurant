<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders - Mughal Indian Cuisine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root{--purple:#1a0b2e;--purple-deep:#120621;--purple-mid:#2d1b4e;--gold:#f5c842;--gold-dark:#d4a828;--shadow:rgba(0,0,0,0.4)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,var(--purple),var(--purple-mid));min-height:100vh;color:#fff}
    
    /* Navbar */
    #navbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(18,6,33,0.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.1)}
    .nav-logo img{height:50px;width:auto}
    .nav-back{color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none;transition:var(--t)}
    .nav-back:hover{color:var(--gold)}
    
    /* Container */
    .container{max-width:1200px;margin:0 auto;padding:30px 20px}
    
    /* Header */
    .page-header{text-align:center;margin-bottom:40px}
    .page-header h1{font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--gold);margin-bottom:8px}
    .page-header p{color:rgba(255,255,255,0.7);font-size:1rem}
    
    /* Email Input */
    .email-input-section{max-width:500px;margin:0 auto 40px;text-align:center}
    .email-input-section label{display:block;color:rgba(255,255,255,0.7);font-size:0.9rem;margin-bottom:10px}
    .email-input-section input{width:100%;padding:14px 20px;border:2px solid rgba(255,255,255,0.15);border-radius:12px;font-size:1rem;color:#fff;background:rgba(255,255,255,0.08);font-family:'Poppins',sans-serif;outline:none;transition:var(--t)}
    .email-input-section input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(245,200,66,0.1)}
    .email-input-section button{width:100%;margin-top:12px;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:var(--t);font-family:'Poppins',sans-serif}
    .email-input-section button:hover{filter:brightness(1.1);transform:translateY(-2px)}
    
    /* Orders List */
    .orders-list{display:grid;gap:20px}
    .order-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;transition:var(--t)}
    .order-card:hover{border-color:rgba(245,200,66,0.3);background:rgba(255,255,255,0.08)}
    
    .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
    .order-number{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);font-weight:700}
    .order-date{color:rgba(255,255,255,0.6);font-size:0.85rem}
    
    .status-indicator{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-weight:600;font-size:0.85rem}
    .status-indicator.pending{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
    .status-indicator.accepted{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.3)}
    .status-indicator.ready{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.3)}
    .status-indicator.on-way{background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid rgba(168,85,247,0.3)}
    .status-indicator.delivered{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
    .status-indicator.rejected{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
    
    .order-details{display:grid;gap:12px;margin-bottom:16px}
    .detail-row{display:flex;justify-content:space-between;font-size:0.9rem}
    .detail-row span:first-child{color:rgba(255,255,255,0.7)}
    .detail-row span:last-child{color:#fff}
    
    .order-items{margin-bottom:16px}
    .order-items h4{color:var(--gold);font-size:0.85rem;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
    .item-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.85rem;color:rgba(255,255,255,0.85);border-bottom:1px solid rgba(255,255,255,0.05)}
    .item-row:last-child{border-bottom:none}
    
    .order-totals{padding-top:16px;border-top:1px solid rgba(255,255,255,0.1)}
    .total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.9rem}
    .total-row.final{font-weight:700;color:var(--gold);font-size:1.1rem;padding-top:10px}
    
    .delivery-time-box{background:rgba(245,200,66,0.1);border-radius:10px;padding:12px;margin-top:12px;border:1px solid rgba(245,200,66,0.2)}
    .delivery-time-box h5{color:var(--gold);font-size:0.85rem;font-weight:700;margin-bottom:6px}
    .delivery-time-box p{color:#fff;font-size:0.85rem}
    .reject-comment-box{background:rgba(239,68,68,0.1);border-radius:10px;padding:12px;margin-top:12px;border:1px solid rgba(239,68,68,0.3)}
    .reject-comment-box h5{color:#ef4444;font-size:0.85rem;font-weight:700;margin-bottom:6px}
    .reject-comment-box p{color:#fff;font-size:0.85rem}
    
    /* Empty State */
    .empty-state{text-align:center;padding:60px 20px}
    .empty-state i{font-size:4rem;color:rgba(255,255,255,0.2);margin-bottom:20px}
    .empty-state h3{color:#fff;font-size:1.3rem;margin-bottom:8px}
    .empty-state p{color:rgba(255,255,255,0.6);font-size:0.9rem}
    .empty-state a{display:inline-block;margin-top:20px;padding:12px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--purple-deep);border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;transition:var(--t)}
    .empty-state a:hover{filter:brightness(1.1);transform:translateY(-2px)}
    
    /* Loading */
    .loading{text-align:center;padding:60px 20px}
    .loading i{font-size:3rem;color:var(--gold);animation:spin 1s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* Toast */
    .toast{position:fixed;bottom:30px;right:30px;z-index:999;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--purple),var(--purple-mid));color:#fff;padding:13px 20px;border-radius:14px;font-size:0.85rem;font-weight:600;box-shadow:0 12px 38px var(--shadow);opacity:0;transform:translateY(18px);transition:all 0.42s cubic-bezier(0.4,0,0.2,1);pointer-events:none;max-width:300px}
    .toast.show{opacity:1;transform:translateY(0);pointer-events:all}
    .toast i{color:var(--gold);font-size:1rem}
    
    /* Responsive */
    @media(max-width:768px){
      .page-header h1{font-size:1.8rem}
      .order-header{flex-direction:column;gap:8px}
      .email-input-section{padding:0 10px}
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav id="navbar">
    <a href="food-ordering.html" class="nav-back">
      <i class="fas fa-arrow-left"></i> Back to Order
    </a>
    <div class="nav-logo">
      <img src="https://davidbantu1999.github.io/mughal-restaurant/logo.png" alt="Mughal"/>
    </div>
    <div style="width:100px"></div>
  </nav>
  
  <div class="container">
    <div class="page-header">
      <h1>My Orders</h1>
      <p>View your order history and status</p>
    </div>
    
    <div class="email-input-section" id="emailSection">
      <label>Enter your email to view orders</label>
      <input type="email" id="userEmail" placeholder="your@email.com"/>
      <button onclick="loadOrders()">View Orders</button>
    </div>
    
    <div id="ordersList" class="orders-list"></div>
    
    <div id="emptyState" class="empty-state" style="display:none">
      <i class="fas fa-receipt"></i>
      <h3>No Orders Found</h3>
      <p>You haven't placed any orders yet</p>
      <a href="food-ordering.html">Start Ordering</a>
    </div>
  </div>
  
  <div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMsg"></span>
  </div>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig={
      apiKey:"AIzaSyAmimDsjW_pF2NGw-w-40QzTsgmf1tdqyI",
      authDomain:"bdmsalonappointment.firebaseapp.com",
      databaseURL:"https://bdmsalonappointment-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"bdmsalonappointment",
      storageBucket:"bdmsalonappointment.appspot.com",
      messagingSenderId:"123456789012",
      appId:"1:123456789012:web:abcdef123456"
    };
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();
    
    function loadOrders(){
      const email=document.getElementById('userEmail').value.trim();
      if(!email){
        showToast('Please enter your email',true);
        return;
      }
      
      localStorage.setItem('userEmail',email);
      
      const ordersList=document.getElementById('ordersList');
      ordersList.innerHTML='<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading orders...</p></div>';
      
      db.ref('orders').orderByChild('customer/email').equalTo(email).on('value',(snapshot)=>{
        const data=snapshot.val();
        ordersList.innerHTML='';
        
        if(!data){
          document.getElementById('emptyState').style.display='block';
          return;
        }
        
        document.getElementById('emptyState').style.display='none';
        const orders=Object.entries(data).sort((a,b)=>b[1].timestamp-a[1].timestamp);
        
        orders.forEach(([orderId,order])=>{
          const statusLabels={
            pending:{text:'Pending',class:'pending',icon:'fa-hourglass-half'},
            accepted:{text:'Accepted',class:'accepted',icon:'fa-check'},
            ready:{text:'Ready',class:'ready',icon:'fa-clock'},
            on_way:{text:'On the Way',class:'on-way',icon:'fa-truck'},
            delivered:{text:'Delivered',class:'delivered',icon:'fa-check-circle'},
            rejected:{text:'Rejected',class:'rejected',icon:'fa-times'}
          };
          const status=statusLabels[order.status]||statusLabels.pending;
          const date=new Date(order.timestamp).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
          
          const card=document.createElement('div');
          card.className='order-card';
          card.innerHTML=`
            <div class="order-header">
              <div>
                <div class="order-number">${order.orderNumber}</div>
                <div class="order-date">${date}</div>
              </div>
              <div class="status-indicator ${status.class}">
                <i class="fas ${status.icon}"></i>
                <span>${status.text}</span>
              </div>
            </div>
            <div class="order-details">
              <div class="detail-row">
                <span>Delivery Type</span>
                <span>${order.delivery.type.charAt(0).toUpperCase()+order.delivery.type.slice(1)}</span>
              </div>
              <div class="detail-row">
                <span>Order Time</span>
                <span>${order.delivery.orderTime}</span>
              </div>
            </div>
            <div class="order-items">
              <h4>Items</h4>
              ${order.items.map(item=>`
                <div class="item-row">
                  <span>${item.name} x${item.quantity}</span>
                  <span>€${(item.price*item.quantity).toFixed(2)}</span>
                </div>
              `).join('')}
            </div>
            <div class="order-totals">
              <div class="total-row">
                <span>Subtotal</span>
                <span>€${order.pricing.subtotal.toFixed(2)}</span>
              </div>
              ${order.pricing.discount>0?`
                <div class="total-row" style="color:#4ade80">
                  <span>Discount</span>
                  <span>-€${order.pricing.discount.toFixed(2)}</span>
                </div>
              `:''}
              <div class="total-row">
                <span>Delivery Fee</span>
                <span>€${order.pricing.deliveryFee.toFixed(2)}</span>
              </div>
              <div class="total-row final">
                <span>Total</span>
                <span>€${order.pricing.total.toFixed(2)}</span>
              </div>
            </div>
            ${order.estimatedTime?`
              <div class="delivery-time-box">
                <h5><i class="fas fa-clock"></i> Estimated Time</h5>
                <p>${order.estimatedTime}</p>
              </div>
            `:''}
            ${order.rejectComment?`
              <div class="reject-comment-box">
                <h5><i class="fas fa-exclamation-circle"></i> Rejection Reason</h5>
                <p>${order.rejectComment}</p>
              </div>
            `:''}
          `;
          ordersList.appendChild(card);
        });
      });
    }
    
    function showToast(msg,isError=false){
      const toast=document.getElementById('toast');
      document.getElementById('toastMsg').textContent=msg;
      toast.classList.toggle('error',isError);
      toast.querySelector('i').className=isError?'fas fa-exclamation-circle':'fas fa-check-circle';
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),3500);
    }
    
    // Check for email in URL or localStorage
    window.onload=()=>{
      const urlParams=new URLSearchParams(window.location.search);
      const email=urlParams.get('email')||localStorage.getItem('userEmail');
      if(email){
        document.getElementById('userEmail').value=email;
        loadOrders();
      }
    };
  </script>
</body>
</html>
